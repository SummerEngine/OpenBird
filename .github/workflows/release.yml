name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build release
        run: xcodebuild -project OpenBird.xcodeproj -scheme OpenBird -configuration Release -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R build/Build/Products/Release/OpenBird.app dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create -volname "OpenBird" -srcfolder dmg_contents -ov -format UDZO OpenBird.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenBird.dmg
          generate_release_notes: true
